<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#7B6FF0">
    <title>SSU 학생혁신단 유형 테스트</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">

    <div id="loading"><div class="spinner"></div></div>

    <!-- START -->
    <div class="screen" id="screen-start">
        <div class="start-content">
            <div class="start-illust">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
            </div>
            <span class="start-badge">숭실대 학생혁신단</span>
            <h1 class="start-title">나는 어떤<br><em>혁신단</em> 유형일까?</h1>
            <p class="start-desc">임시 설명 텍스트입니다.<br>나중에 실제 내용으로 바꿀 예정입니다.</p>
            <div class="start-stats">
                <div class="stat-item">
                    <span class="stat-num" id="stat-questions">8</span>
                    <span class="stat-label">문항</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num">3분</span>
                    <span class="stat-label">소요시간</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num" id="stat-types">4</span>
                    <span class="stat-label">유형</span>
                </div>
            </div>
        </div>
        <button class="btn-primary" id="btn-start">테스트 시작하기</button>
    </div>

    <!-- QUIZ -->
    <div class="screen" id="screen-quiz">
        <div class="progress-wrap">
            <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
        </div>
        <div class="quiz-meta">
            <span class="quiz-num-tag" id="quiz-num">Q1</span>
            <span class="quiz-total" id="quiz-total">1 / 8</span>
        </div>
        <div class="quiz-q-wrap" id="quiz-q-wrap">
            <p class="quiz-question-text" id="quiz-question"></p>
            <div class="choices-list" id="choices-list"></div>
        </div>
    </div>

    <!-- 공유 로딩 오버레이 -->
    <div id="share-overlay" aria-hidden="true">
        <div class="spinner"></div>
        <p>이미지 생성 중...</p>
    </div>

    <!-- 공유 카드 (html2canvas 캡처용, 평소엔 화면 밖) -->
    <div id="share-card" aria-hidden="true">
        <div class="share-bg">
            <div class="share-illust">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
            </div>
            <div class="share-content">
                <p class="share-eyebrow">나의 유형은</p>
                <h2 class="share-name" id="share-type-name"></h2>
                <p class="share-desc" id="share-type-desc"></p>
            </div>
            <div class="share-footer">
                <p class="share-brand">숭실대학교 학생혁신단</p>
                <p class="share-tag">#혁신단유형테스트</p>
            </div>
        </div>
    </div>

    <!-- RESULT -->
    <div class="screen" id="screen-result">
        <div class="result-top">
            <div class="result-illust">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
            </div>
            <p class="result-eyebrow">당신의 유형은</p>
            <h2 class="result-type-name" id="result-name"></h2>
        </div>
        <div class="result-body">
            <div class="result-card">
                <p class="result-card-label">유형 설명</p>
                <p class="result-desc-text" id="result-desc"></p>
            </div>
        </div>
        <div class="result-actions">
            <button class="btn-instagram" id="btn-instagram">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                인스타그램 스토리 공유
            </button>
            <button class="btn-ghost" id="btn-restart">다시 테스트하기</button>
        </div>
    </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
