<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#7B6FF0">
    <title>SSU 학생혁신단 유형 테스트</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">

    <div id="loading"><div class="spinner"></div></div>

    <!-- START -->
    <div class="screen" id="screen-start">
        <div class="start-content">
            <div class="start-illust">
                <img src="images/logo.png" alt="학생혁신단 로고" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <span class="start-badge">숭실대 학생혁신단</span>
            <h1 class="start-title">나는 어떤<br><em>혁신단</em> 유형일까?</h1>
            <p class="start-desc">임시 설명 텍스트입니다.<br>나중에 실제 내용으로 바꿀 예정입니다.</p>
            <div class="start-stats">
                <div class="stat-item">
                    <span class="stat-num" id="stat-questions">8</span>
                    <span class="stat-label">문항</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num">3분</span>
                    <span class="stat-label">소요시간</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num" id="stat-types">4</span>
                    <span class="stat-label">유형</span>
                </div>
            </div>
        </div>
        <button class="btn-primary" id="btn-start">테스트 시작하기</button>
    </div>

    <!-- QUIZ -->
    <div class="screen" id="screen-quiz">
        <div class="progress-wrap">
            <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
        </div>
        <div class="quiz-meta">
            <span class="quiz-num-tag" id="quiz-num">Q1</span>
            <span class="quiz-total" id="quiz-total">1 / 8</span>
        </div>
        <div class="quiz-q-wrap" id="quiz-q-wrap">
            <p class="quiz-question-text" id="quiz-question"></p>
            <div class="choices-list" id="choices-list"></div>
        </div>
    </div>

    <!-- 공유 로딩 오버레이 -->
    <div id="share-overlay" aria-hidden="true">
        <div class="spinner"></div>
        <p>이미지 생성 중...</p>
    </div>

    <!-- 공유 카드 (html2canvas 캡처용, 평소엔 화면 밖) -->
    <div id="share-card" aria-hidden="true">
        <div class="share-bg">
            <div class="share-illust">
                <img src="images/logo.png" alt="학생혁신단 로고" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <div class="share-content">
                <p class="share-eyebrow">나의 유형은</p>
                <h2 class="share-name" id="share-type-name"></h2>
                <p class="share-desc" id="share-type-desc"></p>
            </div>
            <div class="share-footer">
                <p class="share-brand">숭실대학교 학생혁신단</p>
                <p class="share-tag">#혁신단유형테스트</p>
            </div>
        </div>
    </div>

    <!-- RESULT -->
    <div class="screen" id="screen-result">
        <div class="result-top">
            <div class="result-illust">
                <img src="images/logo.png" alt="학생혁신단 로고" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <p class="result-eyebrow">당신의 유형은</p>
            <h2 class="result-type-name" id="result-name"></h2>
        </div>

        <div class="result-body">
            <div class="result-card">
                <div class="result-poster-wrap" id="poster-wrap" style="display: none;">
                    <img src="" id="result-poster-img" alt="사업 포스터">
                </div>
                <p class="result-card-label">유형 설명</p>
                <p class="result-desc-text" id="result-desc"></p>
                </div>
        </div>

        <div class="result-actions">
            <button class="btn-instagram" id="btn-instagram">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white">...</svg>
                <span>인스타그램 스토리 공유</span>
            </button>

            <div class="event-notice-box">
                <p class="notice-title">🎁 이벤트 참여 방법</p>
                <ul class="notice-list">
                    <li>스토리 공유 시 <a href="https://www.instagram.com/ssu_innovators/" target="_blank" style="color: var(--primary); font-weight: 700; text-decoration: underline;">@ssu_innovators</a> 태그 필수!</li>
                    <li><strong>공개 계정</strong> 및 <strong>팔로우</strong> 필수!</li>
                </ul>
            </div>

            <button class="btn-ghost" id="btn-restart">다시 테스트하기</button>
        </div>
    </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="js/analytics.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
